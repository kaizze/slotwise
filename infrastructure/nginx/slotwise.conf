# nginx reverse proxy for the SlotWise testing deploy.
#
# Plain HTTP, no TLS — appropriate for a testing deploy reached by IP or a
# throwaway subdomain with trusted testers, not for anything handling real
# customer data unsupervised. Adding TLS (e.g. via certbot) is a prerequisite
# for the alpha pass, not this one — see the deploy runbook for that line.
#
# Install: copy to /etc/nginx/sites-available/slotwise, symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.
#
# Layout: dashboard at the bare host, API under /api/ and /webhooks/ on the
# SAME host/port (80) — this matters because the dashboard's auth cookie is
# scoped same-site; keeping both behind one origin during testing avoids
# CORS/cookie cross-origin complications entirely, which is one less thing
# to debug while you're just trying to confirm the app runs on a real box.
# (Production/alpha will likely want api.yourdomain.com as a true separate
# origin — see apps/api/server.ts's CORS split for why that's fine later.)

server {
    listen 80;
    server_name _;  # replace with your domain, or leave as-is for IP-only access

    # API and webhooks proxy through first (more specific locations win)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /webhooks/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # Everything else goes to the dashboard (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
